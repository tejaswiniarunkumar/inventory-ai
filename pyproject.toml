# pyproject.toml
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes — unused imports, undefined names
    "I",   # isort — import ordering
]
ignore = [
    "E501",  # line too long — we handle this with line-length above
]